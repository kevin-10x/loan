<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Haraka Loans — Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
  .admin-wrap { max-width: 960px; margin: 40px auto; padding: 0 24px; }
  table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 12px; overflow: hidden; }
  th, td { text-align: left; padding: 12px 14px; border-bottom: 1px solid var(--line); font-size: 0.88rem; }
  th { background: #F1EFE6; color: var(--ink-soft); text-transform: uppercase; font-size: 0.72rem; letter-spacing: 0.05em; }
  button.small { padding: 6px 12px; font-size: 0.8rem; border-radius: 7px; border: none; cursor: pointer; margin-right: 6px; }
  .approve-btn { background: var(--good); color: white; }
  .decline-btn { background: var(--bad); color: white; }
  #keyBar { display: flex; gap: 10px; margin-bottom: 20px; }
  #keyBar input { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid var(--line); }
  #keyBar button { padding: 10px 16px; border-radius: 8px; border: none; background: var(--forest); color: white; cursor: pointer; }
</style>
</head>
<body>
<div class="admin-wrap">
  <h1 style="font-size:1.6rem;">Admin — loan review</h1>
  <p class="muted">This key is for staff use only. In production, replace with real staff login/authentication.</p>
  <div id="keyBar">
    <input type="password" id="adminKeyInput" placeholder="Admin key (ADMIN_KEY from your .env)" />
    <button id="loadBtn">Load applications</button>
  </div>
  <table>
    <thead>
      <tr><th>Name</th><th>Phone</th><th>Amount</th><th>Status</th><th>Actions</th></tr>
    </thead>
    <tbody id="rows"></tbody>
  </table>
</div>
<script src="admin.js"></script>
</body>
</html>
